---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args: ["src", "tests", "tasks"]
        additional_dependencies:
          - flake8-pyproject==1.2.3

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint

  - repo: local
    hooks:
      - id: isort
        name: isort
        entry: uv
        args: ["run", "isort", "."]
        language: system
        pass_filenames: false
        types: [python]

      - id: mypy
        name: mypy
        entry: uv
        args: ["run", "mypy", "src", "tasks"]
        language: system
        files: ^(src|tasks)/
        pass_filenames: false
        types: [python]
