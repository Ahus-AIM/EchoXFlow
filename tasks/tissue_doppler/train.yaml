---
model:
  kind: tissue_doppler
  in_channels_per_frame: 1
  doppler_channels: 1
  conditioning_features: 0
  channels: [32, 64, 128, 256, 320, 320]
  strides:
    - [1, 2, 2]
    - [1, 2, 2]
    - [1, 2, 2]
    - [1, 2, 2]
    - [1, 2, 2]
  kernel_sizes:
    - [1, 3, 3]
    - [3, 3, 3]
    - [3, 3, 3]
    - [3, 3, 3]
    - [3, 3, 3]
    - [3, 3, 3]
  num_res_units: 1
  output_spatial_stride: [1, 1]
  target_spatial_shape: [256, 256]
optimizer:
  name: adammuon
  learning_rate: 0.0037
  weight_decay: 0.0
trainer:
  max_epochs: 8
  accelerator: auto
  devices: 1
  precision: bf16-mixed
data:
  root_dir: null
  clip_length: 32
  clip_stride: 16
  min_frames_per_case: 32
  input_spatial_shape: [256, 256]
  target_spatial_shape: [256, 256]
  train_sampling_mode: sliding
  val_sampling_mode: full_case
  train_full_case_max_frames: 48
  val_full_case_max_frames: 96
  alignment_slack_factor: 1.5
  accepted_fps_range: [26.0, 33.0]
  val_fraction: 0.1
  max_files: null
  max_train_samples: null
  max_val_samples: null
  train_batch_size: 4
  val_batch_size: 2
  num_workers: 8
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  multiprocessing_sharing_strategy: file_system
  seed: 0
loss:
  velocity_band_l1_weight: 1.0
artifacts:
  root_dir: outputs/runs
  epoch_scores_name: train_scores.jsonl
