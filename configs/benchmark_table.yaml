rows:
  - method: temporal_mean
    domain: beamspace
    label: Temporal mean
    input_domain: Beamspace
  - method: temporal_mean
    domain: cartesian
    label: Temporal mean
    input_domain: Scan-converted
  - method: frame_unet
    domain: beamspace
    label: 2D U-Net
    input_domain: Beamspace
  - method: frame_unet
    domain: cartesian
    label: 2D U-Net
    input_domain: Scan-converted
  - method: temporal_unet
    domain: beamspace
    label: 3D U-Net
    input_domain: Beamspace
  - method: temporal_unet
